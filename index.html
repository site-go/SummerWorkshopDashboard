<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTECHLAB | Room Assignment v7</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #f1f5f9;
            --card: #ffffff;
            --full: #ef4444;
            --available: #10b981;
            --closed: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: var(--bg); padding: 20px; color: #1e293b; }
        .container { max-width: 1200px; margin: 0 auto; }
        
        header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; flex-wrap: wrap; gap: 20px; }
        .header-actions { display: flex; align-items: center; gap: 15px; }

        .sync-btn {
            background: white; border: 1px solid #e2e8f0; padding: 10px 18px; border-radius: 12px;
            font-weight: 700; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; gap: 8px;
            transition: all 0.2s; color: #475569;
        }
        .sync-btn.loading { opacity: 0.6; pointer-events: none; }

        .batch-selector { display: flex; gap: 8px; background: #e2e8f0; padding: 5px; border-radius: 50px; }
        .batch-btn { padding: 8px 24px; border-radius: 50px; border: none; cursor: pointer; font-weight: 700; font-size: 0.8rem; transition: 0.3s; }
        .batch-btn.active { background: var(--primary); color: white; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }

        .room-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .room-card { background: var(--card); border-radius: 24px; padding: 25px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; }
        
        .room-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
        .room-name { font-size: 1.2rem; font-weight: 800; color: #1e293b; }
        .room-tag { font-size: 0.65rem; padding: 4px 12px; border-radius: 20px; font-weight: 800; text-transform: uppercase; }
        .tag-avail { background: #dcfce7; color: #166534; }
        .tag-full { background: #fee2e2; color: #991b1b; }
        .tag-closed { background: #f1f5f9; color: var(--closed); }

        .ws-indicator { font-size: 0.9rem; font-weight: 700; color: var(--primary); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

        .progress-container { background: #f1f5f9; height: 12px; border-radius: 10px; margin: 10px 0; overflow: hidden; }
        .progress-bar { background: var(--primary); height: 100%; transition: width 0.5s ease; }
        .occupancy-text { font-size: 0.85rem; font-weight: 600; color: #64748b; }

        .search-section { background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; border: 1px solid #e2e8f0; }
        #studentSearch { width: 100%; padding: 15px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 1rem; outline: none; }
        
        .assignment-table { width: 100%; border-collapse: collapse; background: white; border-radius: 20px; overflow: hidden; border: 1px solid #e2e8f0; }
        .assignment-table th { background: #f8fafc; padding: 15px; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: #64748b; }
        .assignment-table td { padding: 15px; border-top: 1px solid #f1f5f9; font-size: 0.9rem; }
        .room-badge { padding: 5px 12px; border-radius: 8px; font-weight: 700; font-size: 0.7rem; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <div>
                <h1 style="font-weight: 800;">Room Assignment Dashboard</h1>
                <p id="lastSync" style="font-size: 0.85rem; color: #64748b;">Syncing with Google Sheets...</p>
            </div>
            
            <div class="header-actions">
                <button id="syncBtn" class="sync-btn" onclick="fetchData(true)">
                    <span id="syncText">Sync Now</span>
                </button>
                <div class="batch-selector">
                    <button class="batch-btn active" onclick="switchBatch('batch1', this)">Batch 1</button>
                    <button class="batch-btn" onclick="switchBatch('batch2', this)">Batch 2</button>
                    <button class="batch-btn" onclick="switchBatch('batch3', this)">Batch 3</button>
                </div>
            </div>
        </header>

        <div class="room-grid">
            <div class="room-card">
                <div class="room-header">
                    <div class="room-name">Makerspace Lab</div>
                    <span id="tag-arduino" class="room-tag tag-avail">Available</span>
                </div>
                <div class="ws-indicator">🤖 Arduino Workshop</div>
                <div class="progress-container"><div id="bar-arduino" class="progress-bar" style="width: 0%"></div></div>
                <div id="text-arduino" class="occupancy-text">0 / 48 Students</div>
            </div>

            <div class="room-card">
                <div class="room-header">
                    <div class="room-name">Function Room 1</div>
                    <span id="tag-mbot" class="room-tag tag-avail">Available</span>
                </div>
                <div class="ws-indicator">🏎️ mBot2 Workshop</div>
                <div class="progress-container"><div id="bar-mbot" class="progress-bar" style="width: 0%"></div></div>
                <div id="text-mbot" class="occupancy-text">0 / 50 Students</div>
            </div>

            <div class="room-card">
                <div class="room-header">
                    <div class="room-name">Function Room 2</div>
                    <span id="tag-dynamic" class="room-tag tag-avail">Available</span>
                </div>
                <div class="ws-indicator" id="label-dynamic">🛠️ 3D Printing / 🚁 Drone</div>
                <div class="progress-container"><div id="bar-dynamic" class="progress-bar" style="width: 0%"></div></div>
                <div id="text-dynamic" class="occupancy-text">0 / 30 Students</div>
            </div>
        </div>

        <div class="search-section">
            <input type="text" id="studentSearch" placeholder="🔍 Search participant name..." onkeyup="renderTable()">
        </div>

        <table class="assignment-table">
            <thead>
                <tr>
                    <th>Participant Name</th>
                    <th>Workshop Choice</th>
                    <th>Assigned Room</th>
                </tr>
            </thead>
            <tbody id="assignmentBody"></tbody>
        </table>
    </div>

    <script>
        const BATCH_URLS = {
            'batch1': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRbCq73MJLutPIdiSHMtsLgzvzE0QrPOJuHC2CPbb8B1H0Yi3Ewije4kqdwLEvR8Fc9X1mf0dqh4nAb/pub?gid=2111996398&single=true&output=csv',
            'batch2': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRbCq73MJLutPIdiSHMtsLgzvzE0QrPOJuHC2CPbb8B1H0Yi3Ewije4kqdwLEvR8Fc9X1mf0dqh4nAb/pub?gid=1002419209&single=true&output=csv',
            'batch3': 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRbCq73MJLutPIdiSHMtsLgzvzE0QrPOJuHC2CPbb8B1H0Yi3Ewije4kqdwLEvR8Fc9X1mf0dqh4nAb/pub?gid=801337014&single=true&output=csv'
        };

        let currentBatch = 'batch1';
        let participants = [];

        async function fetchData(isManual = false) {
            const btn = document.getElementById('syncBtn');
            if (isManual) btn.classList.add('loading');

            try {
                const response = await fetch(`${BATCH_URLS[currentBatch]}&t=${Date.now()}`);
                const data = await response.text();
                const rows = data.split(/\r?\n/).filter(r => r.trim() !== "").slice(1);
                
                const counts = { arduino: 0, mbot: 0, dynamic: 0 };

                participants = rows.map(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length < 13) return null;

                    const name = cols[0].replace(/"/g, '').trim();
                    const topic = (cols[13] || "").toLowerCase(); 
                    let assignedRoom = "Unassigned";

                    // LOGIC: 
                    // Arduino -> Makerspace
                    // mBot -> Func Room 1
                    // Batch 2 Bambu -> Func Room 2
                    // Batch 3 Drone -> Func Room 2 (Bambu Closed)
                    
                    if (topic.includes("arduino")) {
                        assignedRoom = "Makerspace Lab";
                        counts.arduino++;
                    } else if (topic.includes("mbot")) {
                        assignedRoom = "Function Room 1";
                        counts.mbot++;
                    } else if ((topic.includes("bambu") || topic.includes("3d printing")) && currentBatch === 'batch2') {
                        assignedRoom = "Function Room 2";
                        counts.dynamic++;
                    } else if (topic.includes("drone") && currentBatch === 'batch3') {
                        assignedRoom = "Function Room 2";
                        counts.dynamic++;
                    } else if (topic.includes("bambu") && currentBatch === 'batch3') {
                        assignedRoom = "❌ BAMBU CLOSED (B3)";
                    } else if (topic.includes("drone") && currentBatch !== 'batch3') {
                        assignedRoom = "❌ DRONE CLOSED";
                    }

                    return { name, topic: cols[13], assignedRoom };
                }).filter(p => p !== null && p.name !== "FULL NAME");

                updateUI(counts);
                renderTable();
                document.getElementById('lastSync').innerText = "Last Sync: " + new Date().toLocaleTimeString();
                if (isManual) btn.classList.remove('loading');
            } catch (e) { 
                console.error("Sync Error", e);
                if(isManual) btn.classList.remove('loading');
            }
        }

        function updateUI(counts) {
            // Room UI updates
            const updateRoom = (id, count, cap, tagId, label = null) => {
                const bar = document.getElementById(`bar-${id}`);
                const tag = document.getElementById(tagId);
                const txt = document.getElementById(`text-${id}`);
                
                bar.style.width = Math.min((count/cap*100), 100) + "%";
                txt.innerText = `${count} / ${cap} Students`;
                
                if (count === 0) {
                    tag.innerText = "Empty";
                    tag.className = "room-tag tag-closed";
                } else if (count >= cap) {
                    tag.innerText = "FULL";
                    tag.className = "room-tag tag-full";
                    bar.style.background = "var(--full)";
                } else {
                    tag.innerText = "Available";
                    tag.className = "room-tag tag-avail";
                    bar.style.background = "var(--primary)";
                }

                if (label) {
                    const labelEl = document.getElementById('label-dynamic');
                    if (currentBatch === 'batch1') labelEl.innerText = "🛌 No Active Workshop";
                    if (currentBatch === 'batch2') labelEl.innerText = "🛠️ 3D Printing (Bambu)";
                    if (currentBatch === 'batch3') labelEl.innerText = "🚁 Drone Workshop";
                }
            };

            updateRoom('arduino', counts.arduino, 48, 'tag-arduino');
            updateRoom('mbot', counts.mbot, 50, 'tag-mbot');
            updateRoom('dynamic', counts.dynamic, 30, 'tag-dynamic', true);
        }

        function renderTable() {
            const query = document.getElementById('studentSearch').value.toLowerCase();
            const body = document.getElementById('assignmentBody');
            body.innerHTML = participants
                .filter(p => p.name.toLowerCase().includes(query))
                .map(p => `
                    <tr>
                        <td style="font-weight:700">${p.name}</td>
                        <td style="color:#64748b; font-size: 0.8rem;">${p.topic}</td>
                        <td><span class="room-badge" style="background:${p.assignedRoom.includes('❌') ? '#fee2e2' : '#eef2ff'}; color:${p.assignedRoom.includes('❌') ? '#991b1b' : 'var(--primary)'}">${p.assignedRoom}</span></td>
                    </tr>
                `).join('');
        }

        function switchBatch(batch, btn) {
            currentBatch = batch;
            document.querySelectorAll('.batch-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchData(true);
        }

        setInterval(() => fetchData(false), 30000);
        window.onload = () => fetchData(false);
    </script>
</body>
</html>
